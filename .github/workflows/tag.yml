name: Bump version

on:
  # push:
    # branches:
      # - main
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'minor'
        type: choice
        options: [major, minor]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: '0'
        token: ${{ secrets.GH_PAT }}
    - name: Bump version and push tag
      run: |
        git fetch --tags
        LATEST=$(git tag --sort=-version:refname | grep -E '^[0-9]+\.*[0-9]*$' | head -n 1)
        if [ -z "$LATEST" ]; then
          NEW_TAG="1"
        else
          IFS='.' read -r MAJOR MINOR <<< "$LATEST"
          [ -z "$MINOR" ] && MINOR=0
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP="${{ github.event.inputs.bump_type }}"
          else
            COMMIT_MSG=$(git log -1 --pretty=%B)
            if echo "$COMMIT_MSG" | grep -q "#major"; then
              BUMP="major"
            else
              BUMP="minor"
            fi
          fi
          if [ "$BUMP" = "major" ]; then
            NEW_TAG="$((MAJOR + 1))"
          else
            NEW_TAG="$MAJOR.$((MINOR + 1))"
          fi
        fi
        git tag "$NEW_TAG"
        git push origin "$NEW_TAG"
